<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Learnify AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f23;
      color: #e2e8f0;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .container { text-align: center; max-width: 420px; }
    .icon {
      width: 80px; height: 80px; margin: 0 auto 24px;
      border-radius: 50%; background: #1e1e3f;
      display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 40px; height: 40px; fill: none; stroke: #6366f1; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-block; padding: 10px 24px; border-radius: 8px;
      background: #6366f1; color: #fff; text-decoration: none;
      font-size: 0.875rem; font-weight: 600; transition: background 0.2s;
    }
    .btn:hover { background: #4f46e5; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <path d="M12 2L2 7l10 5 10-5-10-5z" />
        <path d="M2 17l10 5 10-5" />
        <path d="M2 12l10 5 10-5" />
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>It looks like you've lost your internet connection. Check your network and try again.</p>
    <a href="/" class="btn">Try again</a>
  </div>
</body>
</html>
